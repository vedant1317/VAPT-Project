<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>JWT Security Analysis Report</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap");

    :root {
      --bg-base: #f6f8f5;
      --bg-soft: #e8efe9;
      --surface: #ffffff;
      --surface-2: #f4f7f4;
      --ink-strong: #13221c;
      --ink-muted: #4a5f55;
      --line: #cfdad3;
      --accent: #0f766e;
      --critical: #b42318;
      --high: #c2410c;
      --medium: #0369a1;
      --low: #2f7d4a;
      --shadow-soft: 0 18px 40px rgba(16, 37, 30, 0.08);
      --radius-lg: 18px;
      --radius-md: 14px;
      --radius-sm: 10px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Manrope", "Segoe UI", sans-serif;
      background: linear-gradient(165deg, var(--bg-base) 0%, #edf3ef 45%, #f9fbf8 100%);
      color: var(--ink-strong);
      min-height: 100vh;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .ambient {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(circle at 8% 10%, rgba(15, 118, 110, 0.16), transparent 32%),
        radial-gradient(circle at 88% 12%, rgba(3, 105, 161, 0.12), transparent 26%),
        radial-gradient(circle at 78% 82%, rgba(47, 125, 74, 0.1), transparent 28%);
      z-index: -1;
    }

    .page {
      width: min(1120px, calc(100% - 40px));
      margin: 28px auto 44px;
      display: grid;
      gap: 18px;
    }

    .hero {
      background: linear-gradient(135deg, #fefefe 0%, #f2f7f3 100%);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-soft);
      padding: 22px;
      display: grid;
      gap: 14px;
    }

    .hero-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      flex-wrap: wrap;
    }

    .eyebrow {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent);
      font-weight: 700;
      margin-bottom: 6px;
    }

    .title {
      margin: 0;
      font-size: clamp(1.35rem, 2.7vw, 2rem);
      line-height: 1.2;
      font-weight: 800;
      color: var(--ink-strong);
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--ink-muted);
      font-size: 0.97rem;
      max-width: 64ch;
    }

    .risk-chip {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      border-radius: 999px;
      padding: 9px 14px;
      background: #eaf4ef;
      border: 1px solid #b9cec2;
      font-size: 0.85rem;
      font-weight: 700;
      color: #164736;
      white-space: nowrap;
    }

    .risk-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: currentColor;
    }

    .meta-list {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      font-size: 0.82rem;
      color: var(--ink-muted);
    }

    .meta-pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 7px 11px;
      background: var(--surface);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(172px, 1fr));
      gap: 12px;
    }

    .metric {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      padding: 14px;
      box-shadow: 0 10px 20px rgba(16, 37, 30, 0.05);
      min-height: 100px;
      display: grid;
      gap: 6px;
      align-content: start;
    }

    .metric-label {
      font-size: 0.78rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--ink-muted);
      font-weight: 700;
    }

    .metric-value {
      font-size: 1.5rem;
      font-weight: 800;
      line-height: 1;
    }

    .metric-note {
      font-size: 0.84rem;
      color: var(--ink-muted);
      margin-top: 2px;
    }

    .metric-critical .metric-value {
      color: var(--critical);
    }

    .metric-high .metric-value {
      color: var(--high);
    }

    .metric-medium .metric-value {
      color: var(--medium);
    }

    .metric-low .metric-value {
      color: var(--low);
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      padding: 16px;
      box-shadow: 0 12px 24px rgba(16, 37, 30, 0.05);
    }

    .panel-title {
      margin: 0 0 10px;
      font-size: 1.06rem;
      font-weight: 700;
      color: var(--ink-strong);
      letter-spacing: 0.01em;
    }

    .json-block {
      margin: 0;
      background: var(--surface-2);
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      padding: 12px;
      font-family: "IBM Plex Mono", Consolas, monospace;
      font-size: 0.79rem;
      overflow-x: auto;
      color: #123225;
      white-space: pre;
    }

    .findings-grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(auto-fit, minmax(270px, 1fr));
    }

    .finding-card {
      border-radius: var(--radius-md);
      border: 1px solid var(--line);
      background: var(--surface);
      box-shadow: 0 10px 22px rgba(16, 37, 30, 0.05);
      padding: 14px;
      display: grid;
      gap: 10px;
      border-top: 4px solid #9eaea5;
    }

    .finding-card.critical {
      border-top-color: var(--critical);
    }

    .finding-card.high {
      border-top-color: var(--high);
    }

    .finding-card.medium {
      border-top-color: var(--medium);
    }

    .finding-card.low {
      border-top-color: var(--low);
    }

    .finding-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .finding-title {
      margin: 0;
      font-size: 0.95rem;
      font-weight: 700;
      line-height: 1.35;
    }

    .severity-pill {
      border-radius: 999px;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 800;
      padding: 4px 9px;
      border: 1px solid transparent;
      white-space: nowrap;
    }

    .severity-pill.critical {
      color: #8a1a14;
      background: #fdeae8;
      border-color: #f2b8b5;
    }

    .severity-pill.high {
      color: #93370d;
      background: #fff0e8;
      border-color: #f5ccb2;
    }

    .severity-pill.medium {
      color: #0d5378;
      background: #eaf4fb;
      border-color: #b5d8ef;
    }

    .severity-pill.low {
      color: #1f5d39;
      background: #eaf6ef;
      border-color: #b9dcc7;
    }

    .finding-copy {
      margin: 0;
      color: var(--ink-muted);
      font-size: 0.9rem;
    }

    .finding-subtitle {
      margin: 0;
      color: #254238;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .finding-evidence {
      margin: 0;
      background: var(--surface-2);
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      padding: 10px;
      font-family: "IBM Plex Mono", Consolas, monospace;
      font-size: 0.75rem;
      color: #1a352b;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .empty-state {
      margin: 0;
      border-radius: var(--radius-sm);
      border: 1px dashed #a7bab0;
      background: #f5faf7;
      padding: 14px;
      color: #24523e;
      font-size: 0.92rem;
    }

    .reveal {
      opacity: 0;
      transform: translateY(14px);
      animation: reveal-up 0.58s cubic-bezier(0.17, 0.84, 0.44, 1) forwards;
    }

    @keyframes reveal-up {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 780px) {
      .page {
        width: min(100%, calc(100% - 22px));
        margin: 14px auto 24px;
      }

      .hero {
        padding: 16px;
      }

      .panel,
      .metric,
      .finding-card {
        padding: 12px;
      }

      .meta-list {
        gap: 8px;
      }
    }
  </style>
</head>
<body>
  <div class="ambient" aria-hidden="true"></div>
  <div id="report-root"></div>

  <script>
    const REPORT_DATA = {"generated_at": "2026-04-23T16:49:05.958142+00:00", "risk_score": 0.0, "risk_level": "NONE", "finding_count": 0, "severity_counts": {"critical": 0, "high": 0, "medium": 0, "low": 0, "other": 0}, "header": {"alg": "HS256", "typ": "JWT"}, "payload": {"sub": "demo-user", "iss": "demo", "aud": "demo-api", "exp": 1776966545}, "findings": []};
  </script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script>
    const e = React.createElement;

    function severityKey(value) {
      const normalized = String(value || "LOW").toLowerCase();
      if (normalized === "critical") return "critical";
      if (normalized === "high") return "high";
      if (normalized === "medium") return "medium";
      return "low";
    }

    function pretty(value) {
      try {
        return JSON.stringify(value, null, 2);
      } catch {
        return String(value);
      }
    }

    function MetricCard(props) {
      return e("article", {
        className: "metric metric-" + props.tone + " reveal",
        style: { animationDelay: props.delay + "ms" },
      }, [
        e("p", { className: "metric-label", key: "label" }, props.label),
        e("p", { className: "metric-value", key: "value" }, String(props.value)),
        e("p", { className: "metric-note", key: "note" }, props.note),
      ]);
    }

    function FindingCard(props) {
      const finding = props.finding;
      const severity = String(finding.severity || "LOW").toUpperCase();
      const sevKey = severityKey(finding.severity);
      const delay = 220 + props.index * 45;

      return e("article", {
        className: "finding-card " + sevKey + " reveal",
        style: { animationDelay: delay + "ms" },
        key: String(finding.id || "finding") + "-" + String(props.index),
      }, [
        e("div", { className: "finding-head", key: "head" }, [
          e("h3", { className: "finding-title", key: "title" }, String(finding.title || "Untitled finding")),
          e("span", { className: "severity-pill " + sevKey, key: "sev" }, severity),
        ]),
        e("p", { className: "finding-copy", key: "desc" }, String(finding.description || "")),
        e("p", { className: "finding-subtitle", key: "impact-label" }, "Impact"),
        e("p", { className: "finding-copy", key: "impact" }, String(finding.impact || "")),
        e("p", { className: "finding-subtitle", key: "fix-label" }, "Remediation"),
        e("p", { className: "finding-copy", key: "fix" }, String(finding.remediation || "")),
        e("p", { className: "finding-subtitle", key: "evidence-label" }, "Evidence"),
        e("pre", { className: "finding-evidence", key: "evidence" }, pretty(finding.evidence || {})),
      ]);
    }

    function App() {
      const report = REPORT_DATA || {};
      const counts = report.severity_counts || {};
      const findings = Array.isArray(report.findings) ? report.findings : [];

      return e("main", { className: "page" }, [
        e("section", { className: "hero reveal", style: { animationDelay: "30ms" }, key: "hero" }, [
          e("div", { className: "hero-top", key: "top" }, [
            e("div", { key: "title-wrap" }, [
              e("p", { className: "eyebrow", key: "eyebrow" }, "JWT Assessment Report"),
              e("h1", { className: "title", key: "title" }, "JWT Security Analysis"),
              e(
                "p",
                { className: "subtitle", key: "subtitle" },
                "Professional risk summary with claim-level findings, evidence snapshots, and remediation guidance."
              ),
            ]),
            e("div", { className: "risk-chip", key: "chip" }, [
              e("span", { className: "risk-dot", key: "dot" }),
              e(
                "span",
                { key: "text" },
                "Overall Risk " + String(report.risk_score || 0) + "/10 (" + String(report.risk_level || "NONE") + ")"
              ),
            ]),
          ]),
          e("div", { className: "meta-list", key: "meta" }, [
            e("span", { className: "meta-pill", key: "timestamp" }, "Generated: " + String(report.generated_at || "")),
            e("span", { className: "meta-pill", key: "finding-count" }, "Findings: " + String(report.finding_count || 0)),
          ]),
        ]),

        e("section", { className: "stats-grid", key: "stats" }, [
          e(MetricCard, { label: "Critical", value: counts.critical || 0, note: "Immediate attention", tone: "critical", delay: 80, key: "mc" }),
          e(MetricCard, { label: "High", value: counts.high || 0, note: "Fix in current sprint", tone: "high", delay: 110, key: "mh" }),
          e(MetricCard, { label: "Medium", value: counts.medium || 0, note: "Track and schedule", tone: "medium", delay: 140, key: "mm" }),
          e(MetricCard, { label: "Low", value: counts.low || 0, note: "Harden progressively", tone: "low", delay: 170, key: "ml" }),
        ]),

        e("section", { className: "panel reveal", style: { animationDelay: "130ms" }, key: "header" }, [
          e("h2", { className: "panel-title", key: "title" }, "Token Header"),
          e("pre", { className: "json-block", key: "body" }, pretty(report.header || {})),
        ]),

        e("section", { className: "panel reveal", style: { animationDelay: "160ms" }, key: "payload" }, [
          e("h2", { className: "panel-title", key: "title" }, "Token Payload"),
          e("pre", { className: "json-block", key: "body" }, pretty(report.payload || {})),
        ]),

        e("section", { className: "panel reveal", style: { animationDelay: "190ms" }, key: "findings" }, [
          e("h2", { className: "panel-title", key: "title" }, "Findings"),
          findings.length
            ? e("div", { className: "findings-grid", key: "grid" }, findings.map((item, index) => e(FindingCard, { finding: item, index: index, key: String(item.id || "finding") + "-" + String(index) })))
            : e("p", { className: "empty-state", key: "empty" }, "No findings detected for this token."),
        ]),
      ]);
    }

    ReactDOM.createRoot(document.getElementById("report-root")).render(e(App));
  </script>
</body>
</html>
